<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1628" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Gestión acuícola para pequeños y medianos productores" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>AcuiCal</title>
    <style>
      #splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: #0a1628; color: #4fc3f7; font-family: system-ui, sans-serif; transition: opacity .3s; }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash span { font-size: 64px; }
      #splash p { font-size: 14px; color: #8899b0; margin: 0; }
      @keyframes spin { to { transform: rotate(360deg); } }
      #splash .spinner { width: 24px; height: 24px; border: 2px solid #1a3a5c; border-top-color: #4fc3f7; border-radius: 50%; animation: spin .8s linear infinite; }
    </style>
  </head>
  <body>
    <div id="splash"><span>🐟</span><p>AcuiCal</p><div class="spinner"></div></div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        const el = document.getElementById('splash');
        if (el) setTimeout(() => el.classList.add('hide'), 200);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
